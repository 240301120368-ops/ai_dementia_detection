<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera & Questionnaire - NeuroCare AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-teal': '#00796B',
                        'brand-teal-light': '#4DB6AC',
                        'brand-cyan': '#E0F7FA',
                        'brand-gray': '#424242',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-cyan font-sans">

    <main class="container mx-auto px-6 py-12">
        <div class="bg-white text-gray-800 rounded-3xl shadow-xl p-8 md:p-12">
            <!-- Facial Expression Analysis -->
            <div class="bg-brand-cyan/50 p-6 rounded-2xl">
                <h3 class="text-2xl font-semibold text-brand-gray mb-4">Facial Expression Task</h3>
                <p class="text-gray-600 mb-4">Enable your camera and follow the prompts to express different emotions. This helps our AI understand your non-verbal cues.</p>
                <div class="bg-black rounded-lg w-full h-48 flex items-center justify-center mb-4">
                    <p class="text-white">Camera Feed Placeholder</p>
                </div>
                <div class="text-center">
                    <button id="start-camera-btn" class="bg-brand-teal text-white px-8 py-3 rounded-full font-bold hover:bg-brand-teal-light transition-colors shadow-lg">
                        Start Camera
                    </button>
                </div>
            </div>

            <!-- Questionnaire Section -->
            <div class="mt-10 bg-brand-cyan/50 p-6 rounded-2xl">
                <h3 class="text-2xl font-semibold text-brand-gray mb-4 text-center">Cognitive Questionnaire</h3>
                <p class="text-gray-600 mb-6 text-center">Answer these questions to help us build a more complete picture of your cognitive health.</p>
                <div class="space-y-4 max-w-2xl mx-auto">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">How often do you have trouble remembering recent events?</label>
                        <select class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-teal focus:border-brand-teal">
                            <option>Never</option>
                            <option>Rarely</option>
                            <option>Sometimes</option>
                            <option>Often</option>
                            <option>Always</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">How often do you struggle to find the right words in a conversation?</label>
                        <select class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-teal focus:border-brand-teal">
                            <option>Never</option>
                            <option>Rarely</option>
                            <option>Sometimes</option>
                            <option>Often</option>
                            <option>Always</option>
                        </select>
                    </div>
                    <div class="text-center pt-4">
                        <button id="submit-questionnaire-btn" class="bg-brand-teal text-white px-8 py-3 rounded-full font-bold hover:bg-brand-teal-light transition-colors shadow-lg">Submit Answers</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="js/script.js"></script>
</body>
</html>
