<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - NeuroCare AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-teal': '#00796B',
                        'brand-teal-light': '#4DB6AC',
                        'brand-cyan': '#E0F7FA',
                        'brand-gray': '#424242',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-cyan font-sans flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold text-brand-gray text-center mb-6">Set a New Password</h2>
        <form id="reset-password-form">
            <div class="mb-4">
                <label for="reset-password" class="block text-sm font-medium text-gray-700">New Password</label>
                <input type="password" id="reset-password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-teal focus:border-brand-teal" autocomplete="new-password">
                <div id="password-requirements" class="mt-2 text-sm space-y-1 hidden">
                    <p id="req-length" class="flex items-center invalid"><svg class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>At least 8 characters</p>
                    <p id="req-uppercase" class="flex items-center invalid"><svg class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>An uppercase letter</p>
                    <p id="req-lowercase" class="flex items-center invalid"><svg class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>A lowercase letter</p>
                    <p id="req-number" class="flex items-center invalid"><svg class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>A number</p>
                    <p id="req-special" class="flex items-center invalid"><svg class="w-4 h-4 mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>A special character (!@#...)</p>
                </div>
            </div>
            <div class="mb-6">
                <label for="confirm-password" class="block text-sm font-medium text-gray-700">Confirm New Password</label>
                <input type="password" id="confirm-password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-brand-teal focus:border-brand-teal" autocomplete="new-password">
            </div>
            <p id="reset-error" class="text-red-500 text-sm text-center mb-4 hidden"></p>
            <p id="reset-success" class="text-green-600 text-sm text-center mb-4 hidden"></p>
            <button type="submit" class="w-full bg-brand-teal text-white py-2 px-4 rounded-full font-semibold hover:bg-brand-teal-light">Reset Password</button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            <a href="index.html" class="font-medium text-brand-teal hover:underline">Back to Home</a>
        </p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
